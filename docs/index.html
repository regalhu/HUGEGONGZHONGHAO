<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>胡哥说餐饮公众号工具</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <aside class="panel controls" aria-label="生成设置">
          <div class="brand-block">
            <div class="brand-mark">胡</div>
            <div>
              <h1>胡哥说餐饮</h1>
              <p>公众号文章生成工具</p>
            </div>
          </div>

          <form id="generatorForm" class="form-stack">
            <label>
              <span>文章类型</span>
              <select id="articleType">
                <option value="ten_lessons">餐饮10句劝</option>
                <option value="hot_interpretation">餐饮热点解读</option>
                <option value="methodology">餐饮方法论</option>
              </select>
            </label>

            <label>
              <span>选题</span>
              <select id="topicSelect"></select>
            </label>

            <div class="field-grid">
              <label>
                <span>日期</span>
                <input id="publishDate" type="date">
              </label>
              <label>
                <span>期号</span>
                <input id="issueNumber" type="number" min="1" step="1" value="229">
              </label>
            </div>

            <div class="field-grid">
              <label>
                <span>品牌名</span>
                <input id="brandName" type="text" value="胡哥说餐饮">
              </label>
              <label>
                <span>作者</span>
                <input id="authorName" type="text" value="胡哥">
              </label>
            </div>

            <label>
              <span>标题</span>
              <input id="titleInput" type="text">
            </label>

            <label>
              <span>摘要</span>
              <textarea id="digestInput" rows="3"></textarea>
            </label>

            <div class="button-row">
              <button class="primary" id="generateButton" type="submit">生成</button>
              <button id="randomButton" type="button">换题</button>
            </div>
          </form>
        </aside>

        <section class="preview-area" aria-label="文章预览">
          <header class="topbar">
            <div>
              <p id="statusText">准备就绪</p>
              <h2 id="previewTitle">正在载入内容库</h2>
            </div>
            <div class="actions">
              <button id="copyTextButton" type="button">复制正文</button>
              <button id="copyHtmlButton" type="button">复制HTML</button>
              <button id="downloadMdButton" type="button">导出MD</button>
              <button id="downloadHtmlButton" type="button">导出HTML</button>
            </div>
          </header>

          <div class="meta-strip">
            <span id="metaDate"></span>
            <span id="metaTopic"></span>
            <span id="metaCount"></span>
          </div>

          <article id="articlePreview" class="article-preview"></article>
        </section>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
